[tool:pytest]
testpaths = 
    apps/backend/streaming/test_*.py
    apps/frontend/src/**/__tests__/**/*.test.ts
    apps/frontend/src/**/__tests__/**/*.test.tsx
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes
    --durations=10
markers =
    unit: Unit tests
    integration: Integration tests
    e2e: End-to-end tests
    streaming: Streaming-specific tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
