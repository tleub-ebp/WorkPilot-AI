name: Wiki · refresh narrative & translations

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Sync mode'
        required: true
        default: full
        type: choice
        options: [narrative, translate, translate-en, full, bootstrap]

permissions:
  contents: read

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run narrative + translate sync
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_USER_NAME: WorkPilot Wiki Bot
          GIT_USER_EMAIL: noreply@workpilot.ai
          WIKI_REPO: https://x-access-token:${{ secrets.WIKI_PUSH_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          python scripts/wiki/sync_wiki.py --mode "$MODE"
