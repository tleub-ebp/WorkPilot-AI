name: 'Setup Node.js Frontend'
description: 'Set up Node.js with npm and cached dependencies for the frontend'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '22'
  ignore-scripts:
    description: 'Whether to use --ignore-scripts flag during npm ci'
    required: false
    default: 'false'

outputs:
  cache-hit:
    description: 'Whether npm cache was hit'
    value: ${{ steps.cache.outputs.cache-hit }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Get pnpm cache directory
      id: pnpm-cache-dir
      shell: bash
      run: echo "dir=$(pnpm store path)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm dependencies
      id: cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache-dir.outputs.dir }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-

    - name: Install dependencies
      shell: bash
      # Install pnpm first since the project uses pnpm workspaces
      run: npm install -g pnpm

    - name: Install frontend dependencies with pnpm
      shell: bash
      # Use pnpm to install dependencies since the project uses pnpm workspaces
      # Ignore scripts to avoid electron-rebuild issues in CI
      run: cd apps/frontend && pnpm install --ignore-scripts

    - name: Verify pnpm installation
      shell: bash
      run: |
        if [ ! -d "apps/frontend/node_modules" ]; then
          echo "::error::Frontend node_modules does not exist. pnpm install may have failed."
          exit 1
        fi
        echo "Frontend node_modules present ($(ls apps/frontend/node_modules | wc -l) entries)"

    - name: Install electron-vite build tool
      shell: bash
      # electron-vite bin link is not reliably created by npm ci for workspace devDependencies.
      # Install it explicitly at root so node_modules/.bin/electron-vite is always present.
      run: npm install electron-vite@5.0.0 --no-save --ignore-scripts
